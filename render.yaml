services:
  - type: web
    name: devcollab-backend
    runtime: node
    rootDir: backend
    buildCommand: npm install
    startCommand: node src/index.js
    envVars:
      - key: DATABASE_URL
        sync: false        # You'll paste Supabase URL manually in Render dashboard
      - key: JWT_SECRET
        sync: false
      - key: CLIENT_URL
        sync: false        # Your Vercel frontend URL
      - key: PORT
        value: 5000
      - key: JDOODLE_CLIENT_ID
        sync: false
      - key: JDOODLE_CLIENT_SECRET
        sync: false
