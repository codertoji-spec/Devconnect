version: "3.8"

# docker-compose lets you run backend + frontend + database all at once
# with a single command: docker-compose up

services:
  # PostgreSQL database
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: devcollab
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data     # Persists DB data across restarts
      - ./backend/src/config/schema.sql:/docker-entrypoint-initdb.d/schema.sql  # Auto-run schema on first start

  # Node.js backend
  backend:
    build: ./backend
    ports:
      - "5000:5000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/devcollab
      JWT_SECRET: change_this_in_production_please
      CLIENT_URL: http://localhost:5173
      PORT: 5000
    depends_on:
      - db   # Wait for DB to be ready before starting backend

  # React frontend
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend

volumes:
  postgres_data:
